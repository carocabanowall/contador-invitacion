<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuenta regresiva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 20px;
    }
    .countdown {
      font-size: 2rem;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .box {
      background: rgba(255,255,255,0.1);
      padding: 15px 20px;
      border-radius: 10px;
      min-width: 80px;
    }
    .label {
      font-size: 0.8rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cuenta regresiva</h1>
    <div class="countdown">
      <div class="box"><div id="days">0</div><div class="label">Días</div></div>
      <div class="box"><div id="hours">0</div><div class="label">Horas</div></div>
      <div class="box"><div id="minutes">0</div><div class="label">Minutos</div></div>
      <div class="box"><div id="seconds">0</div><div class="label">Segundos</div></div>
    </div>
  </div>

  <script>
    // Fecha objetivo: 12 diciembre 2026 19:00 Argentina (UTC-3)
    // Usamos Date.UTC para evitar problemas de zona horaria
    const targetDate = new Date(Date.UTC(2026, 11, 12, 22, 0, 0)); // 19:00 -03:00 es 22:00 UTC

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.querySelector(".countdown").innerHTML = "¡Llegó el momento!";
        clearInterval(intervalId); // Detenemos el intervalo
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = hours;
      document.getElementById("minutes").textContent = minutes;
      document.getElementById("seconds").textContent = seconds;
    }

    const intervalId = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
